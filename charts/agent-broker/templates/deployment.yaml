{{- range $name, $cfg := .Values.agents }}
{{- $d := dict "ctx" $ "agent" $name "cfg" $cfg }}
{{- $pvcEnabled := and $cfg.persistence $cfg.persistence.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-broker.agentFullname" $d }}
  labels:
    {{- include "agent-broker.labels" $d | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "agent-broker.selectorLabels" $d | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") $ | sha256sum }}
      labels:
        {{- include "agent-broker.selectorLabels" $d | nindent 8 }}
    spec:
      containers:
        - name: agent-broker
          image: {{ include "agent-broker.agentImage" $d | quote }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          env:
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "agent-broker.agentFullname" $d }}
                  key: discord-bot-token
            - name: HOME
              value: /home/agent
            {{- range $k, $v := $cfg.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- with $cfg.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $cfg.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/agent-broker
              readOnly: true
            {{- if $pvcEnabled }}
            - name: data
              mountPath: /home/agent
            {{- end }}
            {{- if $cfg.agentsMd }}
            - name: config
              mountPath: /home/agent/AGENTS.md
              subPath: AGENTS.md
            {{- end }}
      {{- with $cfg.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $cfg.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "agent-broker.agentFullname" $d }}
        {{- if $pvcEnabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "agent-broker.agentFullname" $d }}
        {{- end }}
{{- end }}
