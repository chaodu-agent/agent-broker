image:
  repository: ghcr.io/thepagent/agent-broker
  tag: "afad7f9"
  pullPolicy: IfNotPresent

agents:
  kiro:
    image:
      repository: ""
      tag: ""
    command: kiro-cli
    args:
      - acp
      - --trust-all-tools
    discord:
      botToken: ""
      allowedChannels:
        - "YOUR_CHANNEL_ID"
    workingDir: /home/agent
    env: {}
    envFrom: []
    pool:
      maxSessions: 10
      sessionTtlHours: 24
    reactions:
      enabled: true
      removeAfterReply: false
    persistence:
      enabled: true
      storageClass: ""
      size: 1Gi
    agentsMd: ""
    resources: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}
